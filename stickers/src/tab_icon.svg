<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 74" width="96" height="74">
  <!-- タブ画像: タクボ 顔アップ -->

  <!-- 背景 -->
  <rect width="96" height="74" fill="#00000a"/>

  <!-- 白髪 -->
  <rect x="22" y="4" width="52" height="6" fill="#e8e8e8"/>
  <rect x="16" y="10" width="64" height="6" fill="#e8e8e8"/>
  <rect x="14" y="16" width="8" height="18" fill="#e8e8e8"/>
  <rect x="74" y="16" width="8" height="18" fill="#e8e8e8"/>

  <!-- 顔 -->
  <rect x="22" y="16" width="52" height="38" fill="#f5c89a"/>
  <!-- 眉 -->
  <rect x="26" y="22" width="14" height="5" fill="#888"/>
  <rect x="56" y="22" width="14" height="5" fill="#888"/>
  <!-- 目 -->
  <rect x="27" y="29" width="11" height="8" fill="#2c2c2c"/>
  <rect x="58" y="29" width="11" height="8" fill="#2c2c2c"/>
  <rect x="28" y="30" width="4" height="4" fill="#fff"/>
  <rect x="59" y="30" width="4" height="4" fill="#fff"/>
  <!-- 口 -->
  <rect x="36" y="44" width="24" height="6" fill="#c07050"/>

  <!-- 服の肩 -->
  <rect x="8" y="54" width="80" height="20" fill="#f6ad55"/>
  <!-- 襟 -->
  <rect x="38" y="54" width="20" height="12" fill="#fff8e1"/>

  <!-- オレンジ枠 -->
  <rect x="0" y="0" width="96" height="74" fill="none" stroke="#f6ad55" stroke-width="3"/>
</svg>
