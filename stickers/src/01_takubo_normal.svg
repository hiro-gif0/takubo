<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 320" width="370" height="320">
  <!-- 01: タクボ 通常 — 37x32ドット (各10px) -->

  <!-- 白髪 -->
  <rect x="150" y="20" width="70" height="10" fill="#e8e8e8"/>
  <rect x="140" y="30" width="90" height="10" fill="#e8e8e8"/>
  <rect x="140" y="40" width="10" height="20" fill="#e8e8e8"/>
  <rect x="220" y="40" width="10" height="20" fill="#e8e8e8"/>

  <!-- 顔 (肌色) -->
  <rect x="150" y="40" width="70" height="50" fill="#f5c89a"/>
  <!-- 目 -->
  <rect x="160" y="60" width="10" height="10" fill="#2c2c2c"/>
  <rect x="200" y="60" width="10" height="10" fill="#2c2c2c"/>
  <!-- 眉 -->
  <rect x="158" y="52" width="14" height="6" fill="#666"/>
  <rect x="198" y="52" width="14" height="6" fill="#666"/>
  <!-- 口 (普通) -->
  <rect x="175" y="80" width="20" height="6" fill="#c07050"/>

  <!-- 首 -->
  <rect x="170" y="90" width="30" height="10" fill="#f5c89a"/>

  <!-- 服 (オレンジジャケット) -->
  <rect x="130" y="100" width="110" height="70" fill="#f6ad55"/>
  <!-- 襟 -->
  <rect x="170" y="100" width="30" height="20" fill="#fff8e1"/>
  <!-- ボタン -->
  <rect x="183" y="125" width="6" height="6" fill="#e07000"/>
  <rect x="183" y="138" width="6" height="6" fill="#e07000"/>
  <rect x="183" y="151" width="6" height="6" fill="#e07000"/>

  <!-- 腕 (左) -->
  <rect x="100" y="100" width="30" height="60" fill="#f6ad55"/>
  <rect x="90" y="150" width="30" height="20" fill="#f5c89a"/>
  <!-- 腕 (右) -->
  <rect x="240" y="100" width="30" height="60" fill="#f6ad55"/>
  <rect x="250" y="150" width="30" height="20" fill="#f5c89a"/>

  <!-- スカート -->
  <rect x="130" y="170" width="110" height="50" fill="#8a5030"/>

  <!-- 脚 -->
  <rect x="150" y="220" width="30" height="50" fill="#f5c89a"/>
  <rect x="190" y="220" width="30" height="50" fill="#f5c89a"/>
  <!-- 靴 -->
  <rect x="145" y="270" width="40" height="15" fill="#3a2010"/>
  <rect x="185" y="270" width="40" height="15" fill="#3a2010"/>

  <!-- アウトライン強調 (顔) -->
  <rect x="148" y="38" width="74" height="2" fill="#3a2010"/>
  <rect x="148" y="90" width="74" height="2" fill="#3a2010"/>
</svg>
