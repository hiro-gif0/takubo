<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 320" width="370" height="320">
  <!-- 03: タクボ 怒り「論点ずらし！」-->

  <!-- 吹き出し (怒り: ギザギザ枠) -->
  <polygon points="10,10 360,10 360,70 230,70 210,85 220,70 10,70" fill="#ffcccc" stroke="#cc0000" stroke-width="2"/>
  <text x="20" y="48" font-family="'DotGothic16',monospace" font-size="18" fill="#cc0000">論点ずらし！</text>

  <!-- 白髪 (逆立ち気味) -->
  <rect x="140" y="95" width="70" height="10" fill="#e8e8e8"/>
  <rect x="130" y="105" width="90" height="10" fill="#e8e8e8"/>
  <rect x="130" y="80" width="10" height="35" fill="#e8e8e8"/>
  <rect x="210" y="80" width="10" height="35" fill="#e8e8e8"/>
  <!-- 髪の跳ね -->
  <rect x="145" y="70" width="10" height="30" fill="#e8e8e8"/>
  <rect x="215" y="65" width="10" height="30" fill="#e8e8e8"/>

  <!-- 顔 (赤み) -->
  <rect x="140" y="105" width="80" height="60" fill="#f5a070"/>
  <!-- 怒り眉 (内側下がり) -->
  <rect x="148" y="112" width="20" height="7" fill="#3a2010" transform="rotate(-8,158,116)"/>
  <rect x="192" y="112" width="20" height="7" fill="#3a2010" transform="rotate(8,202,116)"/>
  <!-- 目 (つり目) -->
  <rect x="150" y="122" width="14" height="8" fill="#2c2c2c"/>
  <rect x="196" y="122" width="14" height="8" fill="#2c2c2c"/>
  <!-- 口 (への字) -->
  <rect x="158" y="148" width="8" height="6" fill="#c07050"/>
  <rect x="166" y="154" width="28" height="6" fill="#c07050"/>
  <rect x="194" y="148" width="8" height="6" fill="#c07050"/>
  <!-- 怒りマーク -->
  <rect x="215" y="107" width="8" height="20" fill="#ff4444"/>
  <rect x="208" y="107" width="20" height="8" fill="#ff4444"/>

  <!-- 首 -->
  <rect x="165" y="165" width="30" height="10" fill="#f5a070"/>

  <!-- 服 -->
  <rect x="120" y="175" width="120" height="70" fill="#f6ad55"/>
  <rect x="160" y="175" width="40" height="20" fill="#fff8e1"/>

  <!-- 左腕: 指差し -->
  <rect x="60" y="185" width="60" height="25" fill="#f6ad55"/>
  <rect x="20" y="183" width="45" height="18" fill="#f5c89a"/>
  <rect x="12" y="183" width="15" height="12" fill="#f5c89a"/>

  <!-- 右腕: 腰に当てて -->
  <rect x="240" y="175" width="30" height="60" fill="#f6ad55"/>
  <rect x="250" y="225" width="30" height="20" fill="#f5c89a"/>

  <!-- スカート -->
  <rect x="120" y="245" width="120" height="40" fill="#8a5030"/>

  <!-- 脚 -->
  <rect x="140" y="285" width="30" height="20" fill="#f5c89a"/>
  <rect x="180" y="285" width="30" height="20" fill="#f5c89a"/>
  <!-- 靴 -->
  <rect x="135" y="300" width="40" height="15" fill="#3a2010"/>
  <rect x="175" y="300" width="40" height="15" fill="#3a2010"/>
</svg>
