<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- メイン画像: タクボクエスト スタンプセット カバー -->

  <!-- 背景 -->
  <rect width="240" height="240" fill="#00000a"/>
  <!-- CRT scanline風 -->
  <rect width="240" height="2" y="120" fill="rgba(255,255,255,0.05)"/>

  <!-- タイトル -->
  <text x="120" y="30" font-family="'DotGothic16',monospace" font-size="14" fill="#ffff88" text-anchor="middle">タクボクエスト</text>
  <text x="120" y="48" font-family="'DotGothic16',monospace" font-size="11" fill="#aaaaff" text-anchor="middle">スタンプ</text>

  <!-- タクボ (小) -->
  <!-- 白髪 -->
  <rect x="78" y="60" width="44" height="7" fill="#e8e8e8"/>
  <rect x="72" y="67" width="56" height="7" fill="#e8e8e8"/>
  <rect x="70" y="74" width="7" height="16" fill="#e8e8e8"/>
  <rect x="123" y="74" width="7" height="16" fill="#e8e8e8"/>
  <!-- 顔 -->
  <rect x="77" y="74" width="46" height="36" fill="#f5c89a"/>
  <!-- 目 -->
  <rect x="82" y="84" width="9" height="7" fill="#2c2c2c"/>
  <rect x="109" y="84" width="9" height="7" fill="#2c2c2c"/>
  <rect x="83" y="85" width="3" height="3" fill="#fff"/>
  <!-- 眉 -->
  <rect x="80" y="79" width="11" height="4" fill="#888"/>
  <rect x="109" y="79" width="11" height="4" fill="#888"/>
  <!-- 口 -->
  <rect x="90" y="100" width="20" height="5" fill="#c07050"/>
  <!-- 首 -->
  <rect x="96" y="110" width="18" height="7" fill="#f5c89a"/>
  <!-- 服 -->
  <rect x="68" y="117" width="64" height="44" fill="#f6ad55"/>
  <rect x="96" y="117" width="18" height="12" fill="#fff8e1"/>
  <!-- 腕 -->
  <rect x="50" y="117" width="18" height="38" fill="#f6ad55"/>
  <rect x="43" y="148" width="18" height="13" fill="#f5c89a"/>
  <rect x="132" y="117" width="18" height="38" fill="#f6ad55"/>
  <rect x="139" y="148" width="18" height="13" fill="#f5c89a"/>
  <!-- スカート -->
  <rect x="68" y="161" width="64" height="32" fill="#8a5030"/>
  <!-- 脚 -->
  <rect x="76" y="193" width="20" height="30" fill="#f5c89a"/>
  <rect x="104" y="193" width="20" height="30" fill="#f5c89a"/>
  <!-- 靴 -->
  <rect x="71" y="218" width="28" height="10" fill="#3a2010"/>
