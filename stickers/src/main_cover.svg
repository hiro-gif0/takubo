  <!-- 下部テキスト -->
  <rect x="0" y="228" width="240" height="12" fill="#0c0c34"/>
  <text x="120" y="238" font-family="'DotGothic16',monospace" font-size="9" fill="#4444cc" text-anchor="middle">イトー市・タクボクエストⅱ</text>
