<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 320" width="370" height="320">
  <!-- 07: 議会 「不信任！」-->

  <!-- 吹き出し -->
  <rect x="5" y="5" width="200" height="60" fill="#e8f0ff" stroke="#1a3060" stroke-width="2"/>
  <rect x="150" y="62" width="20" height="18" fill="#e8f0ff"/>
  <text x="12" y="45" font-family="'DotGothic16',monospace" font-size="20" fill="#1a3060">不信任！</text>

  <!-- 黒髪 (乱れ気味) -->
  <rect x="145" y="85" width="80" height="12" fill="#1a1a1a"/>
  <rect x="135" y="97" width="100" height="12" fill="#1a1a1a"/>
  <rect x="132" y="109" width="14" height="25" fill="#1a1a1a"/>
  <rect x="224" y="109" width="14" height="25" fill="#1a1a1a"/>
  <!-- 乱れた毛 -->
  <rect x="145" y="75" width="8" height="22" fill="#1a1a1a"/>
  <rect x="215" y="72" width="8" height="25" fill="#1a1a1a"/>

  <!-- 顔 (怒り/赤み) -->
  <rect x="146" y="109" width="78" height="60" fill="#c8b8c8"/>
  <!-- 怒り眉 -->
  <rect x="150" y="116" width="24" height="8" fill="#1a1a1a" transform="rotate(-10,162,120)"/>
  <rect x="196" y="116" width="24" height="8" fill="#1a1a1a" transform="rotate(10,208,120)"/>
  <!-- 目 (つり目/見開き) -->
  <rect x="152" y="127" width="18" height="12" fill="#1a3050"/>
  <rect x="200" y="127" width="18" height="12" fill="#1a3050"/>
  <!-- 怒りマーク -->
  <rect x="228" y="112" width="8" height="22" fill="#ff4444"/>
  <rect x="220" y="112" width="24" height="8" fill="#ff4444"/>
  <!-- 口 (怒鳴り) -->
  <rect x="158" y="152" width="54" height="14" fill="#6a3020"/>
  <rect x="162" y="148" width="46" height="6" fill="#9a5040"/>
  <!-- 歯 -->
  <rect x="163" y="153" width="8" height="7" fill="#f0f0f0"/>
  <rect x="173" y="153" width="8" height="7" fill="#f0f0f0"/>
  <rect x="183" y="153" width="8" height="7" fill="#f0f0f0"/>
  <rect x="193" y="153" width="8" height="7" fill="#f0f0f0"/>
  <rect x="203" y="153" width="8" height="7" fill="#f0f0f0"/>

  <!-- 首 -->
  <rect x="168" y="169" width="34" height="12" fill="#c8b8c8"/>

  <!-- スーツ -->
  <rect x="125" y="181" width="120" height="80" fill="#1a3060"/>
  <rect x="174" y="181" width="22" height="22" fill="#f0f4ff"/>
  <rect x="178" y="181" width="14" height="50" fill="#4a93dd"/>
  <rect x="125" y="181" width="52" height="40" fill="#243070"/>
  <rect x="193" y="181" width="52" height="40" fill="#243070"/>

  <!-- 左腕: 拳突き上げ -->
  <rect x="95" y="120" width="30" height="80" fill="#1a3060"/>
  <rect x="90" y="106" width="38" height="32" fill="#dde8f0"/>
  <!-- 右腕: 下に -->
  <rect x="245" y="181" width="30" height="70" fill="#1a3060"/>
  <rect x="244" y="245" width="34" height="22" fill="#dde8f0"/>

  <!-- エフェクト: 衝撃線 -->
  <line x1="95" y1="115" x2="65" y2="90" stroke="#ffaa00" stroke-width="3"/>
  <line x1="95" y1="115" x2="60" y2="125" stroke="#ffaa00" stroke-width="3"/>
  <line x1="95" y1="115" x2="70" y2="105" stroke="#ffaa00" stroke-width="2"/>

  <!-- ズボン -->
  <rect x="125" y="261" width="120" height="50" fill="#0f1e40"/>
  <!-- 脚 -->
  <rect x="140" y="305" width="40" height="15" fill="#0f1e40"/>
  <rect x="190" y="305" width="40" height="15" fill="#0f1e40"/>
  <!-- 靴 -->
  <rect x="135" y="308" width="50" height="12" fill="#0a0a0a"/>
  <rect x="185" y="308" width="50" height="12" fill="#0a0a0a"/>
</svg>
