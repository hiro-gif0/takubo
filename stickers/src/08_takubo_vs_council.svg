<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 320" width="370" height="320">
  <!-- 08: タクボ vs 議会 対決シーン -->

  <!-- 背景: バトルフィールド風 -->
  <rect x="0" y="240" width="370" height="80" fill="#1a3060" opacity="0.3"/>

  <!-- VS テキスト (中央) -->
  <text x="163" y="175" font-family="'DotGothic16',monospace" font-size="36" fill="#ffff00" stroke="#ff8800" stroke-width="2">VS</text>
  <!-- 吹き出し: 始めろ！ -->
  <rect x="130" y="5" width="110" height="40" fill="#fff9c4" stroke="#ff8800" stroke-width="2"/>
  <rect x="178" y="43" width="14" height="12" fill="#fff9c4"/>
  <text x="138" y="32" font-family="'DotGothic16',monospace" font-size="18" fill="#cc4400">始めろ！</text>

  <!-- ===タクボ (左側)=== -->
  <!-- 白髪 -->
  <rect x="20" y="65" width="55" height="8" fill="#e8e8e8"/>
  <rect x="14" y="73" width="67" height="8" fill="#e8e8e8"/>
  <rect x="12" y="81" width="8" height="20" fill="#e8e8e8"/>
  <rect x="73" y="81" width="8" height="20" fill="#e8e8e8"/>
  <!-- 顔 -->
  <rect x="20" y="81" width="53" height="42" fill="#f5c89a"/>
  <!-- 目 (つり目/気合) -->
  <rect x="24" y="90" width="12" height="8" fill="#2c2c2c"/>
  <rect x="57" y="90" width="12" height="8" fill="#2c2c2c"/>
  <rect x="25" y="91" width="4" height="4" fill="#fff"/>
  <!-- 眉 -->
  <rect x="22" y="84" width="16" height="5" fill="#888" transform="rotate(-8,30,86)"/>
  <rect x="55" y="84" width="16" height="5" fill="#888" transform="rotate(8,63,86)"/>
  <!-- 口 (キリッ) -->
  <rect x="30" y="110" width="34" height="8" fill="#c07050"/>
  <!-- 首 -->
  <rect x="31" y="123" width="25" height="8" fill="#f5c89a"/>
  <!-- 服 -->
  <rect x="10" y="131" width="80" height="55" fill="#f6ad55"/>
  <rect x="33" y="131" width="20" height="15" fill="#fff8e1"/>
  <!-- 右腕 (対決方向に突き出し) -->
  <rect x="88" y="135" width="50" height="20" fill="#f6ad55"/>
  <rect x="136" y="130" width="22" height="25" fill="#f5c89a"/>
  <!-- 左腕 -->
  <rect x="0" y="135" width="15" height="45" fill="#f6ad55"/>
  <!-- スカート -->
  <rect x="10" y="186" width="80" height="40" fill="#8a5030"/>
  <!-- 脚 -->
  <rect x="18" y="226" width="22" height="50" fill="#f5c89a"/>
  <rect x="48" y="226" width="22" height="50" fill="#f5c89a"/>
  <!-- 靴 -->
  <rect x="12" y="270" width="32" height="12" fill="#3a2010"/>
  <rect x="42" y="270" width="32" height="12" fill="#3a2010"/>

  <!-- ===議会 (右側)=== -->
  <!-- 黒髪 -->
  <rect x="285" y="65" width="60" height="8" fill="#1a1a1a"/>
  <rect x="278" y="73" width="74" height="8" fill="#1a1a1a"/>
  <rect x="276" y="81" width="10" height="22" fill="#1a1a1a"/>
  <rect x="344" y="81" width="10" height="22" fill="#1a1a1a"/>
  <!-- 顔 -->
  <rect x="286" y="81" width="58" height="44" fill="#dde8f0"/>
  <!-- 目 -->
  <rect x="292" y="91" width="14" height="8" fill="#1a3050"/>
  <rect x="324" y="91" width="14" height="8" fill="#1a3050"/>
  <rect x="304" y="92" width="4" height="4" fill="#fff"/>
  <!-- 眉 -->
  <rect x="290" y="84" width="18" height="5" fill="#1a1a1a" transform="rotate(-10,299,86)"/>
  <rect x="322" y="84" width="18" height="5" fill="#1a1a1a" transform="rotate(10,331,86)"/>
  <!-- 口 (ニヤリ) -->
  <rect x="300" y="111" width="30" height="8" fill="#8a6050"/>
  <!-- 首 -->
  <rect x="302" y="125" width="26" height="8" fill="#dde8f0"/>
  <!-- スーツ -->
  <rect x="276" y="133" width="88" height="55" fill="#1a3060"/>
  <rect x="305" y="133" width="20" height="20" fill="#f0f4ff"/>
  <rect x="309" y="133" width="12" height="40" fill="#63b3ed"/>
  <!-- 左腕 (対決方向) -->
  <rect x="190" y="140" width="88" height="20" fill="#1a3060"/>
  <rect x="178" y="135" width="22" height="25" fill="#dde8f0"/>
  <!-- 右腕 -->
  <rect x="360" y="133" width="10" height="45" fill="#1a3060"/>
  <!-- ズボン -->
  <rect x="276" y="188" width="88" height="45" fill="#0f1e40"/>
  <!-- 脚 -->
  <rect x="286" y="233" width="28" height="55" fill="#0f1e40"/>
  <rect x="320" y="233" width="28" height="55" fill="#0f1e40"/>
  <!-- 靴 -->
  <rect x="280" y="278" width="38" height="12" fill="#0a0a0a"/>
  <rect x="314" y="278" width="38" height="12" fill="#0a0a0a"/>

  <!-- 対決エフェクト (中央の火花) -->
  <polygon points="185,155 195,140 205,158 218,145 210,162 225,165 210,172 218,185 200,175 195,190 188,174 172,180 182,165 168,160" fill="#ffdd00" stroke="#ff8800" stroke-width="1"/>
</svg>
