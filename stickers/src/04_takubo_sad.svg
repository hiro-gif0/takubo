<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 320" width="370" height="320">
  <!-- 04: タクボ 泣き「…」-->

  <!-- 吹き出し -->
  <rect x="220" y="10" width="120" height="50" fill="#e8f4fd" stroke="#666" stroke-width="2"/>
  <rect x="225" y="58" width="15" height="15" fill="#e8f4fd"/>
  <text x="248" y="42" font-family="'DotGothic16',monospace" font-size="28" fill="#555">…</text>

  <!-- 白髪 (うなだれ) -->
  <rect x="150" y="40" width="70" height="10" fill="#e8e8e8"/>
  <rect x="140" y="50" width="90" height="10" fill="#e8e8e8"/>
  <rect x="140" y="60" width="10" height="30" fill="#e8e8e8"/>
  <rect x="220" y="60" width="10" height="30" fill="#e8e8e8"/>
  <!-- 垂れ下がり前髪 -->
  <rect x="155" y="60" width="10" height="30" fill="#d0d0d0"/>
  <rect x="205" y="60" width="10" height="30" fill="#d0d0d0"/>
  <rect x="175" y="50" width="20" height="40" fill="#d0d0d0"/>

  <!-- 顔 (うつむき) -->
  <rect x="150" y="60" width="70" height="55" fill="#f5c89a"/>
  <!-- 眉 (八の字) -->
  <rect x="158" y="68" width="14" height="5" fill="#888" transform="rotate(10,165,70)"/>
  <rect x="198" y="68" width="14" height="5" fill="#888" transform="rotate(-10,205,70)"/>
  <!-- 目 (しょんぼり/半目) -->
  <rect x="160" y="76" width="12" height="5" fill="#2c2c2c"/>
  <rect x="198" y="76" width="12" height="5" fill="#2c2c2c"/>
  <!-- 涙 -->
  <rect x="162" y="85" width="6" height="12" fill="#88ccff"/>
  <rect x="200" y="85" width="6" height="12" fill="#88ccff"/>
  <rect x="160" y="96" width="8" height="8" fill="#88ccff"/>
  <rect x="198" y="96" width="8" height="8" fill="#88ccff"/>
  <!-- 口 (への字) -->
  <rect x="165" y="100" width="6" height="6" fill="#c07050"/>
  <rect x="171" y="106" width="18" height="5" fill="#c07050"/>
  <rect x="189" y="100" width="6" height="6" fill="#c07050"/>

  <!-- 首 -->
  <rect x="170" y="115" width="30" height="10" fill="#f5c89a"/>

  <!-- 服 (うなだれた肩) -->
  <rect x="140" y="125" width="110" height="70" fill="#f6ad55"/>
  <rect x="175" y="125" width="20" height="20" fill="#fff8e1"/>

  <!-- 両腕 (前で組む) -->
  <rect x="115" y="125" width="30" height="50" fill="#f6ad55"/>
  <rect x="100" y="155" width="50" height="20" fill="#f5c89a"/>
  <rect x="225" y="125" width="30" height="50" fill="#f6ad55"/>

  <!-- スカート -->
  <rect x="140" y="195" width="110" height="55" fill="#8a5030"/>

  <!-- 脚 (合わさり気味) -->
  <rect x="158" y="250" width="25" height="50" fill="#f5c89a"/>
  <rect x="187" y="250" width="25" height="50" fill="#f5c89a"/>
  <!-- 靴 -->
  <rect x="153" y="295" width="35" height="15" fill="#3a2010"/>
  <rect x="182" y="295" width="35" height="15" fill="#3a2010"/>
</svg>
