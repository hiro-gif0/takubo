<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 320" width="370" height="320">
  <!-- 02: タクボ ガッツポーズ「よし！」-->

  <!-- 吹き出し -->
  <rect x="220" y="10" width="130" height="50" fill="#fff9c4" stroke="#333" stroke-width="2"/>
  <rect x="225" y="60" width="20" height="15" fill="#fff9c4"/>
  <text x="230" y="42" font-family="'DotGothic16',monospace" font-size="22" fill="#333">よし！</text>

  <!-- 白髪 -->
  <rect x="130" y="20" width="70" height="10" fill="#e8e8e8"/>
  <rect x="120" y="30" width="90" height="10" fill="#e8e8e8"/>
  <rect x="120" y="40" width="10" height="20" fill="#e8e8e8"/>
  <rect x="200" y="40" width="10" height="20" fill="#e8e8e8"/>

  <!-- 顔 -->
  <rect x="130" y="40" width="70" height="50" fill="#f5c89a"/>
  <!-- 目 (ハッピー/細め) -->
  <rect x="140" y="58" width="12" height="6" fill="#2c2c2c"/>
  <rect x="178" y="58" width="12" height="6" fill="#2c2c2c"/>
  <!-- 眉 (上がり気味) -->
  <rect x="138" y="50" width="14" height="5" fill="#666"/>
  <rect x="178" y="50" width="14" height="5" fill="#666"/>
  <!-- 笑顔 (口) -->
  <rect x="148" y="76" width="6" height="6" fill="#c07050"/>
  <rect x="154" y="80" width="22" height="6" fill="#c07050"/>
  <rect x="176" y="76" width="6" height="6" fill="#c07050"/>

  <!-- 首 -->
  <rect x="150" y="90" width="30" height="10" fill="#f5c89a"/>

  <!-- 服 -->
  <rect x="110" y="100" width="110" height="70" fill="#f6ad55"/>
  <rect x="150" y="100" width="30" height="20" fill="#fff8e1"/>
  <rect x="163" y="125" width="6" height="6" fill="#e07000"/>
  <rect x="163" y="138" width="6" height="6" fill="#e07000"/>

  <!-- 左腕: 上に挙げ (ガッツポーズ) -->
  <rect x="70" y="30" width="25" height="70" fill="#f6ad55"/>
  <rect x="60" y="20" width="30" height="30" fill="#f5c89a"/>
  <!-- 右腕: 上に挙げ -->
  <rect x="235" y="30" width="25" height="70" fill="#f6ad55"/>
  <rect x="240" y="20" width="30" height="30" fill="#f5c89a"/>

  <!-- スカート -->
  <rect x="110" y="170" width="110" height="50" fill="#8a5030"/>

  <!-- 脚 -->
  <rect x="130" y="220" width="30" height="50" fill="#f5c89a"/>
  <rect x="170" y="220" width="30" height="50" fill="#f5c89a"/>
  <!-- 靴 -->
  <rect x="125" y="270" width="40" height="15" fill="#3a2010"/>
  <rect x="165" y="270" width="40" height="15" fill="#3a2010"/>
</svg>
