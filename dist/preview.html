<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>生成チラシPNGプレビュー</title>
  <style>
    body { margin: 0; font-family: "Yu Gothic", Meiryo, sans-serif; background: #0f172a; color: #e2e8f0; }
    main { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 16px; }
    img { width: min(100%, 780px); display: block; margin: 16px auto; border-radius: 8px; }
    code { background: #1e293b; border-radius: 6px; padding: 2px 6px; }
  </style>
</head>
<body>
  <main>
    <h1>OpenAI画像生成APIで作成したチラシPNG</h1>
    <p><code>dist/flyer.png</code> が生成済みなら下に表示されます。</p>
    <div class="card">
      <img src="./dist/flyer.png" alt="生成チラシPNG" />
      <p>表示されない場合は <code>python scripts/generate_flyer_with_openai.py</code> を実行してください。</p>
    </div>
  </main>
</body>
</html>
